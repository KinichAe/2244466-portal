<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2244466 Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <svg class="logo-icon" viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5zm0 9l2.5-1.25L12 8.5l-2.5 1.25L12 11zm0 2.5l-5-2.5-5 2.5L12 22l10-8.5-5-2.5-5 2.5z"/>
            </svg>
            <span>2244466 Dashboard</span>
        </div>
        <div class="nav-right">
            <button class="btn btn-icon" id="themeToggle" title="切换主题">
                <svg id="iconSun" style="display:none; width:20px; height:20px; stroke: currentColor; fill: none; stroke-width: 2;" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="iconMoon" style="width:20px; height:20px; stroke: currentColor; fill: none; stroke-width: 2;" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
            <div id="authButtons">
                <button class="btn btn-ghost" onclick="window.app.openModal('loginModal')">登录</button>
                <button class="btn btn-primary" onclick="window.app.openModal('registerModal')">注册</button>
            </div>
            <div id="userMenu" class="hidden" style="display: flex; align-items: center; gap: 10px;">
                <span class="text-sm font-medium" id="navUsername">User</span>
                <button class="btn btn-ghost text-sm" onclick="window.app.logout()">退出</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="hero">
            <h1>服务控制台</h1>
            <p>极简、安全、高效的个人数字化服务管理中心。</p>
        </header>

        <section id="userDashboard" class="dashboard-section hidden">
            <div class="dash-row">
                <h2>我的账户</h2>
                <span class="text-sec text-sm" id="dashEmail"></span>
            </div>
            <div class="dash-grid">
                <div class="dash-row">
                    <span>API 密钥</span>
                    <div>
                        <span id="apiKey" class="api-key-box">Wait...</span>
                        <button class="btn btn-ghost text-sm" onclick="window.app.generateApiKey()">重置</button>
                    </div>
                </div>
                <div class="dash-row">
                    <span>注册时间</span>
                    <span class="text-sec" id="regDate">-</span>
                </div>
                <div id="adminEntry" class="dash-row hidden">
                    <span>系统管理</span>
                    <button class="btn btn-primary text-sm" onclick="window.app.openAdminPanel()">进入后台</button>
                </div>
            </div>
        </section>

        <section id="adminDashboard" class="dashboard-section hidden" style="border: 1px solid var(--accent);">
            <div class="dash-row">
                <h2 style="color: var(--accent);">管理员后台</h2>
                <button class="btn btn-ghost text-sm" onclick="window.app.closeAdminPanel()">关闭</button>
            </div>
            <div style="margin-top: 20px;">
                <h3>用户列表</h3>
                <div class="table-container">
                    <table id="userTable">
                        <thead>
                            <tr>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>注册时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
                <button class="btn btn-ghost text-sm" style="margin-top:12px;" onclick="window.app.exportUsers()">导出用户数据 (JSON)</button>
            </div>
            <div style="margin-top: 30px;">
                <h3>服务卡片管理</h3>
                <div id="serviceToggles" class="dash-grid">
                    </div>
            </div>
        </section>

        <div class="services-grid" id="serviceGrid">
            </div>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <button class="close-btn" onclick="window.app.closeModal('loginModal')">✕</button>
            <h2>欢迎回来</h2>
            <form onsubmit="window.app.handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" id="loginEmail" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="loginPass" class="form-input" required>
                    <div style="text-align: right; margin-top: 6px;">
                        <span class="link text-xs" onclick="window.app.switchModal('loginModal', 'forgotModal')">忘记密码？</span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            <div class="form-footer">
                还没有账号？ <span class="link" onclick="window.app.switchModal('loginModal', 'registerModal')">立即注册</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <button class="close-btn" onclick="window.app.closeModal('registerModal')">✕</button>
            <h2>创建账号</h2>
            <form onsubmit="window.app.handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">用户名 (4-20字符)</label>
                    <input type="text" id="regName" class="form-input" required pattern="^[a-zA-Z0-9_-]{4,20}$" title="字母、数字、下划线、短横线">
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" id="regEmail" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="regPass" class="form-input" required oninput="window.app.checkStrength(this.value)">
                    <div class="strength-meter" style="display:block">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text text-sec" id="strengthText"></div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>
            <div class="form-footer">
                已有账号？ <span class="link" onclick="window.app.switchModal('registerModal', 'loginModal')">直接登录</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="forgotModal">
        <div class="modal">
            <button class="close-btn" onclick="window.app.closeModal('forgotModal')">✕</button>
            <h2>重置密码</h2>
            <p class="text-sm text-sec" style="margin-bottom: 20px; text-align: center;">输入您的注册邮箱，我们将发送重置链接给您。</p>
            <form onsubmit="window.app.handleForgot(event)">
                <div class="form-group">
                    <input type="email" class="form-input" placeholder="name@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">发送链接</button>
            </form>
            <div class="form-footer">
                <span class="link" onclick="window.app.switchModal('forgotModal', 'loginModal')">返回登录</span>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Notification</div>

    <script src="script.js"></script>
</body>
</html>
